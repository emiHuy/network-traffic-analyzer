<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0d1220"/>
  <!-- concentric rings -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#4fc3f7" stroke-width="0.75" opacity="0.2"/>
  <circle cx="16" cy="16" r="9" fill="none" stroke="#4fc3f7" stroke-width="0.75" opacity="0.4"/>
  <circle cx="16" cy="16" r="6" fill="none" stroke="#4fc3f7" stroke-width="0.75" opacity="0.6"/>
  <circle cx="16" cy="16" r="3" fill="none" stroke="#4fc3f7" stroke-width="0.75" opacity="0.8"/>
  <!-- crosshairs -->
  <line x1="16" y1="3" x2="16" y2="29" stroke="#1e2a40" stroke-width="0.5"/>
  <line x1="3" y1="16" x2="29" y2="16" stroke="#1e2a40" stroke-width="0.5"/>
  <!-- sweep -->
  <line x1="16" y1="16" x2="26" y2="6" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <!-- center -->
  <circle cx="16" cy="16" r="1.5" fill="#4fc3f7"/>
  <!-- ping -->
  <circle cx="22" cy="10" r="1.5" fill="#22c55e"/>
</svg>